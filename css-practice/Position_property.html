<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Property</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
     .box{
        height: 50px;
        width: 50px;
        background-color: rgb(231, 205, 255);
        margin: 10px;
        padding: 35px;
     }
     #box1{
        position: static;
     }
     #box2{
        position: relative;
        left:100px;
     }
     #box3{
        position: absolute;
     }
     #box4{
        position: fixed;
     }
    </style>
</head>
<body>
    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
    <div id="box3" class="box">Box3</div>
    <div id="box4" class="box">Box4</div>
</body>
</html>
